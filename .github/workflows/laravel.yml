name: Laravel

on: push

jobs:
  laravel-tests:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*', '13.*']
        include:
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'
          - laravel: '13.*'
            testbench: '11.*'
        exclude:
          # Laravel 13 requires PHP 8.3 or higher
          - laravel: '13.*'
            php: '8.2'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
    - uses: actions/checkout@v4
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        coverage: xdebug
    - name: Cache Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.composer/cache/files
        key: ${{ runner.os }}-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
        restore-keys: |
          ${{ runner.os }}-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-
    - name: Install Dependencies
      run: |
        # The test matrix intentionally installs every supported framework
        # release, including ones currently flagged by security advisories,
        # so opt out of Composer's advisory-based install blocking here.
        composer config --no-plugins policy.advisories.block false
        composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
        composer update --prefer-dist --no-ansi --no-interaction --no-progress
    - name: Execute tests (Unit and Feature tests) via PHPUnit
      run: vendor/bin/phpunit --testdox --coverage-clover=coverage.xml
    - name: Upload Code Coverage Report
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
